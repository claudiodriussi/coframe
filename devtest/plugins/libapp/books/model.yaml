tables:

  Author:
    name: authors
    tags: [anag]
    columns:
      - name: id
        type: ID

      - name: first_name
        type: Name
        nullable: false

      - name: last_name
        type: Name
        nullable: false

      - name: birth_date
        type: Date
        nullable: true

      - name: nationality
        type: String
        length: 50

    # Compound indexes for better query performance
    indexes:
      - name: idx_author_fullname
        columns: [first_name, last_name]
        description: "Search authors by full name"

      - name: idx_author_nationality
        columns: [nationality, last_name]
        description: "Authors by country"

  Publisher:
    name: publishers
    tags: [anag]
    columns:
      - name: id
        type: ID

      - name: name
        type: String
        length: 100
        nullable: false
        index: true

      - name: country
        type: String
        length: 2
        nullable: true
        description: "ISO 3166-1 alpha-2 (US, GB, IT, FR)"

      - name: website
        type: String
        length: 200
        nullable: true

  Book:
    name: books
    tags: [anag]
    columns:
      - name: id
        type: ID

      - name: title
        type: Description
        index: True

      - name: isbn
        type: String
        length: 50
        nullable: false
        unique: false

      - name: publication_date
        type: Date
        nullable: true
        default: null

      - name: price
        type: Price

      - name: language
        type: String
        length: 2
        nullable: true
        index: true
        description: "ISO 639-1 (en, it, fr, es, de)"

      - name: pages
        type: Integer
        nullable: true

      - name: publisher_id
        type: Integer
        nullable: true
        foreign_key:
          target: Publisher.id

      - name: description
        type: Text
        nullable: true

      - name: tags
        type: String
        length: 200
        nullable: true
        description: "Comma-separated tags (first = primary genre)"

    # Compound indexes
    indexes:
      - name: idx_book_isbn
        columns: [isbn]
        unique: false
        description: "ISBN index (non-unique for testing)"

      - name: idx_book_title_date
        columns: [title, publication_date]
        description: "Search books by title and year"

  BookAuthor:
    name: books_authors
    columns:
      - name: notes
        type: String
    many_to_many:
      target1:
        table: Book.id
        column: book_id
      target2:
        table: Author.id
        column: author_id

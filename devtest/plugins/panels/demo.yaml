panels:
  hello_demo:
    title: Hello Demo
    content:
      $ref: "views.hello_main"
    panels:
      - id: sidebar
        pos: right
        width: 300
        $ref: "views.hello_sidebar"

  # ── Author list — simple table, no joins ─────────────────────────────────
  demo_author_list:
    title: Authors
    content:
      $ref: "views.demo_author_list_view"

  # ── Book list — table with Publisher join ─────────────────────────────────
  demo_book_list:
    title: Books
    content:
      $ref: "views.demo_book_list_view"

  # ── Book list with authors — M2M join + group_by ──────────────────────────
  demo_book_authors:
    title: Books with Authors
    content:
      $ref: "views.demo_book_authors_view"


views:
  hello_main:
    type: plugin
    component: library.hello
    props:
      message: "Contenuto principale del panel"
      userName: "Main Area"

  hello_sidebar:
    type: plugin
    component: library.hello
    props:
      message: "Pannello laterale"
      userName: "Sidebar"

  # ── Author list ───────────────────────────────────────────────────────────
  demo_author_list_view:
    type: table
    source:
      model: Author
      order_by: [last_name, first_name]
    columns:
      - field: id
        width: 60
        hozAlign: right
      - field: first_name
        title: First Name
      - field: last_name
        title: Last Name
      - field: nationality
        title: Country
        width: 100
      - field: birth_date
        title: Born
        width: 110
        hozAlign: center
    actions:
      toolbar: [add, search, export]

  # ── Book list with Publisher join ─────────────────────────────────────────
  demo_book_list_view:
    type: table
    source:
      model: Book
      joins:
        - Publisher: "Publisher.id = Book.publisher_id"
      order_by: [title]
    columns:
      - field: id
        width: 60
        hozAlign: right
      - field: title
      - field: Publisher.name
        title: Publisher
      - field: isbn
        title: ISBN
        width: 140
      - field: price
        title: Price
        width: 90
        hozAlign: right
      - field: language
        title: Lang
        width: 60
        hozAlign: center
    actions:
      toolbar: [add, search, export]

  # ── Book list with M2M authors (group_by to avoid duplicate rows) ─────────
  demo_book_authors_view:
    type: table
    source:
      model: Book
      joins:
        - BookAuthor: "BookAuthor.book_id = Book.id"
        - Author: "Author.id = BookAuthor.author_id"
      group_by: ["Book.id", "Book.title", "Book.isbn", "Book.price"]
      order_by: ["Book.title"]
    columns:
      - field: id
        width: 60
        hozAlign: right
      - field: title
      - field: "CASE WHEN COUNT(DISTINCT Author.id) > 1 THEN 'Various' ELSE MIN(Author.last_name) END as author_last"
        title: Last Name
      - field: "CASE WHEN COUNT(DISTINCT Author.id) > 1 THEN '' ELSE MIN(Author.first_name) END as author_first"
        title: First Name
      - field: isbn
        title: ISBN
        width: 140
      - field: price
        title: Price
        width: 90
        hozAlign: right
    actions:
      toolbar: [add, search, export]
